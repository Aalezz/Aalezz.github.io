<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<title>Alezz Aldumaini – AI Engineer</title>
<style>
:root{--bg:#060a12;--surface:#0d1525;--card:#111927;--accent:#00d4ff;--accent2:#7c3aed;--accent3:#06ffa5;--text:#e2e8f0;--muted:#8892a4;--border:rgba(0,212,255,0.15);}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;line-height:1.7;overflow-x:hidden;}
#canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
nav{position:fixed;top:0;width:100%;z-index:200;background:rgba(6,10,18,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-inner{max-width:1100px;margin:auto;display:flex;align-items:center;justify-content:space-between;height:62px;padding:0 5%;}
.logo{font-size:1rem;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:.88rem;transition:.2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--accent);transition:.3s;}
.nav-links a:hover{color:var(--accent);}
.nav-links a:hover::after{width:100%;}
.wrapper{position:relative;z-index:1;}
#hero{min-height:auto;display:flex;align-items:center;padding:100px 5% 60px;}
.hero-inner{max-width:1100px;margin:auto;width:100%;}
.hero-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.35rem 1rem;background:rgba(0,212,255,0.08);border:1px solid var(--border);border-radius:30px;font-size:.78rem;color:var(--accent);margin-bottom:2rem;}
.hero-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--accent3);box-shadow:0 0 8px var(--accent3);animation:pulse 2s infinite;}
.hero-inner h1{font-size:clamp(2.8rem,7vw,5.5rem);font-weight:900;line-height:1.05;margin-bottom:1rem;}
.hero-inner h1 .name{background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200%;animation:gradShift 4s ease infinite;}
.hero-role{font-size:1.1rem;color:var(--accent2);font-weight:600;margin-bottom:.6rem;}
.hero-sub{font-size:1.05rem;color:var(--muted);max-width:580px;margin-bottom:2.5rem;min-height:2.5rem;}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;}
.btn{padding:.75rem 1.8rem;border-radius:10px;font-size:.92rem;font-weight:700;text-decoration:none;transition:.25s;cursor:pointer;border:none;display:inline-block;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 0 24px rgba(0,212,255,0.25);}
.btn-primary:hover{transform:translateY(-2px);}
.btn-outline{border:1px solid var(--border);color:var(--text);background:transparent;}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px);}
.hero-stats{display:flex;gap:3rem;margin-top:4rem;flex-wrap:wrap;}
.stat strong{display:block;font-size:2rem;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat span{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.sec{padding:100px 5%;max-width:1100px;margin:auto;}
.sec-label{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem;}
.sec h2{font-size:2.2rem;font-weight:800;margin-bottom:2.5rem;}
.full-bg{background:var(--surface);}
.full-bg .sec{max-width:100%;}
.full-bg .sec-inner{max-width:1100px;margin:auto;}
.about-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:3rem;align-items:start;}
.about-text p{color:var(--muted);margin-bottom:1rem;font-size:.97rem;}
.about-text p strong{color:var(--text);}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.8rem;}
.info-card h3{font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:1.2rem;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:.55rem 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.88rem;}
.info-row:last-child{border:none;}
.info-row .lbl{color:var(--muted);}
.status-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.2rem .7rem;background:rgba(6,255,165,0.1);border:1px solid rgba(6,255,165,0.25);border-radius:20px;font-size:.78rem;color:var(--accent3);}
.status-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent3);animation:pulse 2s infinite;}
.skill-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:1.5rem;}
.skill-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.6rem;transition:.3s;}
.skill-card:hover{border-color:rgba(0,212,255,.35);transform:translateY(-5px);}
.skill-card h3{font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;}
.tags{display:flex;flex-wrap:wrap;gap:.4rem;}
.tag{display:inline-block;padding:.28rem .7rem;background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.18);border-radius:20px;font-size:.78rem;color:var(--text);}
.filter-bar{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:2rem;}
.filter-btn{padding:.35rem .9rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;transition:.2s;}
.filter-btn:hover,.filter-btn.active{background:rgba(0,212,255,0.1);border-color:var(--accent);color:var(--accent);}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.8rem;}
.proj-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.8rem;position:relative;overflow:hidden;transition:.35s;display:flex;flex-direction:column;}
.proj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));transform:scaleX(0);transform-origin:left;transition:.4s;}
.proj-card:hover{border-color:rgba(0,212,255,0.35);transform:translateY(-6px);box-shadow:0 20px 60px rgba(0,0,0,.4);}
.proj-card:hover::before{transform:scaleX(1);}
.proj-header{display:flex;align-items:flex-start;gap:.8rem;margin-bottom:.8rem;}
.proj-icon{font-size:1.8rem;flex-shrink:0;}
.proj-title h3{font-size:1.05rem;font-weight:700;margin-bottom:.2rem;}
.proj-date{font-size:.75rem;color:var(--accent);font-weight:600;}
.proj-card p{color:var(--muted);font-size:.87rem;margin-bottom:1rem;flex:1;}
.proj-bullets{list-style:none;margin-bottom:1.1rem;}
.proj-bullets li{font-size:.82rem;color:var(--muted);padding:.18rem 0 .18rem 1rem;position:relative;}
.proj-bullets li::before{content:'▹';position:absolute;left:0;color:var(--accent);}
.proj-tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:auto;}
.proj-tag{padding:.22rem .65rem;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.28);border-radius:12px;font-size:.74rem;color:#a78bfa;}
.featured-badge{position:absolute;top:1rem;right:1rem;padding:.18rem .6rem;background:rgba(6,255,165,0.12);border:1px solid rgba(6,255,165,0.25);border-radius:10px;font-size:.68rem;color:var(--accent3);font-weight:700;}
.proj-links{display:flex;gap:.6rem;margin-top:1rem;flex-wrap:wrap;}
.proj-link{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .8rem;border-radius:8px;font-size:.76rem;font-weight:600;text-decoration:none;transition:.2s;border:1px solid;}
.proj-link-gh{border-color:rgba(0,212,255,0.25);color:var(--accent);background:rgba(0,212,255,0.06);}
.proj-link-gh:hover{background:rgba(0,212,255,0.14);border-color:var(--accent);}
.proj-link-demo{border-color:rgba(6,255,165,0.25);color:var(--accent3);background:rgba(6,255,165,0.06);}
.proj-link-demo:hover{background:rgba(6,255,165,0.14);border-color:var(--accent3);}
.case-study-btn{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .8rem;border-radius:8px;font-size:.76rem;font-weight:600;text-decoration:none;transition:.2s;border:1px solid rgba(124,58,237,0.3);color:#a78bfa;background:rgba(124,58,237,0.08);cursor:pointer;}
.case-study-btn:hover{background:rgba(124,58,237,0.18);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:9000;backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:2rem;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;max-width:700px;width:100%;max-height:88vh;overflow-y:auto;padding:2.5rem;position:relative;}
.modal-box.wide{max-width:800px;}
.modal-close{position:absolute;top:1.2rem;right:1.2rem;background:transparent;border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:.2s;}
.modal-close:hover{border-color:var(--accent);color:var(--accent);}
.cs-section{margin-bottom:1.6rem;}
.cs-section h4{font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:.6rem;}
.cs-section p,.cs-section li{color:var(--muted);font-size:.9rem;line-height:1.7;}
.cs-section ul{list-style:none;padding:0;}
.cs-section ul li{padding:.18rem 0 .18rem 1.1rem;position:relative;}
.cs-section ul li::before{content:'▹';position:absolute;left:0;color:var(--accent);}
.cs-outcome{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.5rem;}
.cs-outcome-item{flex:1;min-width:110px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.9rem 1rem;text-align:center;}
.cs-outcome-item strong{display:block;font-size:1.4rem;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.cs-outcome-item span{font-size:.74rem;color:var(--muted);}
.blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.8rem;}
.blog-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.8rem;transition:.35s;display:flex;flex-direction:column;position:relative;overflow:hidden;cursor:pointer;}
.blog-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent2),var(--accent3));transform:scaleX(0);transform-origin:left;transition:.4s;}
.blog-card:hover{border-color:rgba(124,58,237,0.35);transform:translateY(-6px);box-shadow:0 20px 60px rgba(0,0,0,.4);}
.blog-card:hover::before{transform:scaleX(1);}
.blog-tag-el{display:inline-block;padding:.2rem .7rem;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.28);border-radius:12px;font-size:.72rem;color:#a78bfa;margin-bottom:1rem;font-weight:600;}
.blog-card h3{font-size:1rem;font-weight:700;margin-bottom:.6rem;line-height:1.4;}
.blog-card p{color:var(--muted);font-size:.85rem;flex:1;margin-bottom:1.2rem;}
.blog-meta{display:flex;align-items:center;justify-content:space-between;font-size:.76rem;color:var(--muted);}
.blog-arrow{color:var(--accent);font-size:1rem;transition:.2s;}
.blog-card:hover .blog-arrow{transform:translateX(4px);}
.testimonials-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;}
.testimonial-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.8rem;position:relative;transition:.3s;}
.testimonial-card:hover{border-color:rgba(0,212,255,0.3);transform:translateY(-4px);}
.quote-mark{font-size:3rem;line-height:1;color:var(--accent);opacity:.3;font-family:Georgia,serif;position:absolute;top:1rem;left:1.5rem;}
body.rtl .quote-mark{left:auto;right:1.5rem;}
.testimonial-text{color:var(--muted);font-size:.92rem;line-height:1.75;margin-bottom:1.4rem;padding-top:1.5rem;font-style:italic;}
.testimonial-author{display:flex;align-items:center;gap:.9rem;}
.author-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.author-name{font-weight:700;font-size:.9rem;}
.author-role{font-size:.78rem;color:var(--muted);}
.author-stars{color:#fbbf24;font-size:.8rem;margin-top:.1rem;}
.timeline{position:relative;padding-left:2.5rem;}
.timeline::before{content:'';position:absolute;left:0;top:8px;bottom:0;width:2px;background:linear-gradient(to bottom,var(--accent),var(--accent2),transparent);}
.tl-item{position:relative;margin-bottom:2.8rem;}
.tl-item::before{content:'';position:absolute;left:-2.62rem;top:.45rem;width:14px;height:14px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent);}
.tl-date{font-size:.78rem;color:var(--accent);font-weight:700;letter-spacing:.06em;margin-bottom:.25rem;}
.tl-item h3{font-size:1.05rem;font-weight:700;margin-bottom:.25rem;}
.tl-item p{color:var(--muted);font-size:.9rem;}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start;}
.contact-info p{color:var(--muted);margin-bottom:2rem;font-size:.97rem;}
.c-links{display:flex;flex-direction:column;gap:.9rem;}
.c-link{display:flex;align-items:center;gap:.8rem;padding:1rem 1.3rem;background:var(--card);border:1px solid var(--border);border-radius:13px;text-decoration:none;color:var(--text);transition:.25s;font-size:.9rem;}
.c-link:hover{border-color:var(--accent);color:var(--accent);transform:translateX(5px);}
.c-link .ic{font-size:1.2rem;width:28px;text-align:center;}
.contact-form{display:flex;flex-direction:column;gap:1rem;}
.contact-form input,.contact-form textarea{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:.85rem 1.1rem;color:var(--text);font-size:.9rem;outline:none;transition:.25s;font-family:inherit;width:100%;}
.contact-form input:focus,.contact-form textarea:focus{border-color:var(--accent);}
.contact-form textarea{resize:vertical;min-height:130px;}
.contact-form button{padding:.9rem;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:11px;color:#fff;font-weight:700;font-size:.95rem;cursor:pointer;transition:.25s;}
.contact-form button:hover{opacity:.88;transform:translateY(-2px);}
footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:2.5rem 5%;background:var(--surface);}
.footer-inner{max-width:1100px;margin:auto;display:flex;flex-direction:column;align-items:center;gap:1.4rem;}
.footer-logo{font-size:1.1rem;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.footer-socials{display:flex;gap:.6rem;}
.footer-social{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;text-decoration:none;transition:.25s;color:var(--muted);background:var(--card);}
.footer-social:hover{border-color:var(--accent);transform:translateY(-3px);}
.footer-nav{display:flex;gap:1.8rem;flex-wrap:wrap;justify-content:center;}
.footer-nav a{color:var(--muted);text-decoration:none;font-size:.83rem;transition:.2s;}
.footer-nav a:hover{color:var(--accent);}
.footer-divider{width:100%;height:1px;background:var(--border);}
.footer-copy{color:var(--muted);font-size:.8rem;text-align:center;}
.footer-copy span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;}
.hero-layout{display:grid;grid-template-columns:1fr auto;gap:4rem;align-items:center;}
.hero-avatar-wrap{position:relative;width:300px;height:300px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.avatar-core{width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 40% 40%,rgba(0,212,255,0.12),rgba(124,58,237,0.08),rgba(6,10,18,0.9));border:2px solid rgba(0,212,255,0.25);display:flex;align-items:center;justify-content:center;position:relative;z-index:3;}
.brain-svg{width:110px;height:110px;filter:drop-shadow(0 0 8px rgba(0,212,255,0.4));}
.avatar-ring{position:absolute;border-radius:50%;border:1px solid;animation:spinRing linear infinite;}
.ring1{width:200px;height:200px;border-color:rgba(0,212,255,0.2);animation-duration:12s;}
.ring2{width:245px;height:245px;border-color:rgba(124,58,237,0.18);animation-duration:18s;animation-direction:reverse;}
.ring3{width:290px;height:290px;border-color:rgba(6,255,165,0.12);animation-duration:25s;}
.orbit-particle{position:absolute;border-radius:50%;animation:orbitSpin linear infinite;}
.p1{width:8px;height:8px;background:#00d4ff;box-shadow:0 0 10px #00d4ff;top:50%;left:50%;animation-duration:4s;transform-origin:0 -100px;margin:-4px 0 0 -4px;}
.p2{width:6px;height:6px;background:#7c3aed;top:50%;left:50%;animation-duration:6s;transform-origin:0 -122px;margin:-3px 0 0 -3px;animation-delay:-.5s;}
.p3{width:5px;height:5px;background:#06ffa5;top:50%;left:50%;animation-duration:8s;transform-origin:0 -145px;margin:-2.5px 0 0 -2.5px;animation-delay:-1s;}
.p4{width:7px;height:7px;background:#00d4ff;top:50%;left:50%;animation-duration:5s;transform-origin:0 -100px;margin:-3.5px 0 0 -3.5px;animation-delay:-2s;}
.p5{width:5px;height:5px;background:#7c3aed;top:50%;left:50%;animation-duration:7s;transform-origin:0 -122px;margin:-2.5px 0 0 -2.5px;animation-delay:-3s;}
.p6{width:6px;height:6px;background:#06ffa5;top:50%;left:50%;animation-duration:9s;transform-origin:0 -145px;margin:-3px 0 0 -3px;animation-delay:-4s;}
.lang-switch{display:flex;gap:.4rem;align-items:center;}
.lang-btn{background:transparent;border:1px solid rgba(0,212,255,0.3);color:var(--muted);padding:.28rem .75rem;border-radius:20px;font-size:.8rem;font-weight:700;cursor:pointer;transition:.2s;}
.lang-btn:hover{border-color:#00d4ff;color:#00d4ff;}
.lang-btn.active-lang{background:linear-gradient(135deg,#00d4ff,#7c3aed);color:#fff;border-color:transparent;}
body.rtl{direction:rtl;font-family:'Cairo',sans-serif;}
body.rtl .nav-inner,body.rtl .hero-btns,body.rtl .hero-stats,body.rtl .filter-bar,body.rtl .nav-links,body.rtl .footer-nav{flex-direction:row-reverse;}
body.rtl .hero-badge{flex-direction:row-reverse;}
body.rtl .about-grid,body.rtl .contact-grid{direction:rtl;}
body.rtl .info-row{flex-direction:row;}
body.rtl .timeline{padding-left:0;padding-right:2.5rem;}
body.rtl .timeline::before{left:auto;right:0;}
body.rtl .tl-item::before{left:auto;right:-2.62rem;}
body.rtl .c-link{flex-direction:row-reverse;}
body.rtl .proj-header{flex-direction:row-reverse;}
body.rtl .proj-bullets li{padding:.18rem 1rem .18rem 0;}
body.rtl .proj-bullets li::before{left:auto;right:0;}
body.rtl .proj-tags,.body.rtl .tags{flex-direction:row-reverse;}
body.rtl .modal-close{right:auto;left:1.2rem;}
body.rtl .blog-card:hover .blog-arrow{transform:translateX(-4px);}
body.rtl .c-link:hover{transform:translateX(-5px);}
body:not(.rtl) .proj-bullets li{padding:.18rem 0 .18rem 1rem;}
body:not(.rtl) .proj-bullets li::before{left:0;right:auto;}
.blog-post-body h3{font-size:1.05rem;font-weight:700;margin:1.8rem 0 .6rem;color:var(--accent);}
.blog-post-body p{color:var(--muted);margin-bottom:1rem;font-size:.93rem;line-height:1.8;}
.blog-post-body p.lead{font-size:1.05rem;color:var(--text);}
.blog-post-body strong{color:var(--text);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes gradShift{0%,100%{background-position:0%;}50%{background-position:100%;}}
@keyframes spinRing{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes orbitSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@media(max-width:900px){.hero-layout{grid-template-columns:1fr;}.hero-avatar-wrap{width:220px;height:220px;margin:2rem auto 0;}.avatar-core{width:120px;height:120px;}.ring1{width:150px;height:150px;}.ring2{width:185px;height:185px;}.ring3{width:215px;height:215px;}}
@media(max-width:720px){.about-grid,.contact-grid{grid-template-columns:1fr;}.nav-links{display:none;}.hero-stats{gap:1.8rem;}}
</style>
</head>
<body>

var canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),W,H,pts=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
function Pt(){this.reset();}
Pt.prototype.reset=function(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*1.4+.3;this.vx=(Math.random()-.5)*.3;this.vy=(Math.random()-.5)*.3;this.a=Math.random()*.5+.1;this.c=Math.random()>.5?'0,212,255':'124,58,237';};
Pt.prototype.step=function(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W||this.y<0||this.y>H)this.reset();};
Pt.prototype.draw=function(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle='rgba('+this.c+','+this.a+')';ctx.fill();};
for(var i=0;i<130;i++)pts.push(new Pt());
function loop(){ctx.clearRect(0,0,W,H);pts.forEach(function(p){p.step();p.draw();});for(var i=0;i<pts.length;i++)for(var j=i+1;j<pts.length;j++){var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<110){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle='rgba(0,212,255,'+(0.12*(1-d/110))+')';ctx.lineWidth=.5;ctx.stroke();}}requestAnimationFrame(loop);}
loop();

// ─── TYPED ────────────────────────────────────────────────────────────────
var phrases=[],pi=0,ci=0,deleting=false,typedEl=document.getElementById('typedText'),typingTimer;
function runTyping(){
  clearTimeout(typingTimer);
  if(!phrases.length)return;
  var cur=phrases[pi%phrases.length];
  if(!deleting){typedEl.textContent=cur.slice(0,++ci);if(ci===cur.length){deleting=true;typingTimer=setTimeout(runTyping,2200);return;}}
  else{typedEl.textContent=cur.slice(0,--ci);if(ci===0){deleting=false;pi=(pi+1)%phrases.length;}}
  typingTimer=setTimeout(runTyping,deleting?35:55);
}

var BLOG={
  voice:{
    en:{tag:'Voice AI · Engineering',title:'How I Built a Real-Time Arabic Voice Agent with Whisper + Claude',date:'March 2026 · 8 min read',body:'<p class="lead">When I started building Suraya, I had one hard constraint: respond in under 2 seconds — in Arabic. That ruled out most off-the-shelf solutions immediately.</p><h3>Why existing tools failed</h3><p>Most voice AI platforms treat Arabic as an afterthought. They support Modern Standard Arabic reasonably well, but real users speak in dialect — Gulf, Levantine, Egyptian. Accuracy dropped below 60% on real conversational speech. Unusable.</p><h3>Component 1: Wake Word — Picovoice Porcupine</h3><p>Porcupine runs entirely on-device. I trained a custom wake word for "Hey Suraya" in English and Arabic pronunciation. Sensitivity tuning was the hardest part — I settled on 0.6 after testing with 12 people in noisy environments.</p><h3>Component 2: STT — faster-whisper</h3><p>Whisper large-v3 is state-of-the-art for Arabic, but naive CPU inference takes 3-4 seconds. faster-whisper with int8 quantization dropped this to under 600ms. Pre-warming the model on startup saved another 1.2 seconds of perceived latency.</p><h3>Component 3: Reasoning — Claude API</h3><p>Transcribed text goes to Claude with a system prompt that enforces an 80-word max per response and forbids markdown formatting — asterisks get read aloud verbatim by TTS.</p><h3>Component 4: TTS — ElevenLabs with emotion detection</h3><p>I run a lightweight emotion classifier before ElevenLabs. Based on the label (excited, sad, reassuring), I adjust stability parameters to change voice expressiveness.</p><h3>Threading architecture</h3><p>All four components run on separate threads with non-blocking queues between stages. This is what makes sub-2s latency achievable — no component waits for the others.</p><h3>What I\'d do differently</h3><p>Implement streaming TTS from the start — starting playback while the sentence is still being generated shaves 400-600ms. Silence detection also needs more engineering than I expected.</p>'},
    ar:{tag:'الذكاء الاصطناعي الصوتي · هندسة',title:'كيف بنيت وكيل صوتي عربي بزمن استجابة فوري باستخدام Whisper + Claude',date:'مارس 2026 · 8 دقائق قراءة',body:'<p class="lead">عندما بدأت في بناء سرايا، كان لدي قيد صارم واحد: الاستجابة في أقل من ثانيتين — بالعربية. هذا استبعد معظم الحلول الجاهزة فوراً.</p><h3>لماذا فشلت الأدوات الموجودة</h3><p>معظم منصات الذكاء الاصطناعي الصوتي تتعامل مع العربية كأمر ثانوي. تدعم العربية الفصحى بشكل معقول، لكن المستخدمين الحقيقيين يتحدثون باللهجات — الخليجية، الشامية، المصرية. انخفضت الدقة إلى أقل من 60% على الكلام الحواري الحقيقي. غير صالح للاستخدام.</p><h3>المكون الأول: كلمة التنبيه — Picovoice Porcupine</h3><p>يعمل Porcupine محلياً تماماً على الجهاز. دربت نموذج كلمة تنبيه مخصص لـ"هي سرايا" بالنطق الإنجليزي والعربي. كان ضبط الحساسية الجزء الأصعب — استقريت على 0.6 بعد الاختبار مع 12 شخصاً في بيئات صاخبة.</p><h3>المكون الثاني: تحويل الكلام — faster-whisper</h3><p>Whisper large-v3 هو الأفضل للعربية، لكن الاستدلال الساذج يستغرق 3-4 ثوانٍ. faster-whisper مع تكميم int8 خفض هذا إلى أقل من 600 ميلي ثانية. التحميل المسبق للنموذج وفّر 1.2 ثانية أخرى من زمن الاستجابة المُدرك.</p><h3>المكون الثالث: التفكير — Claude API</h3><p>يذهب النص المنسوخ إلى Claude مع موجه نظام يفرض حداً أقصى من 80 كلمة لكل استجابة ويمنع تنسيق markdown.</p><h3>المكون الرابع: تحويل النص للكلام — ElevenLabs مع كشف العاطفة</h3><p>أشغّل مصنف عاطفة خفيف الوزن قبل ElevenLabs. بناءً على التسمية (متحمس، حزين، مطمئن)، أضبط معاملات الاستقرار لتغيير تعبيرية الصوت.</p><h3>معمارية الخيوط</h3><p>تعمل جميع المكونات الأربعة على خيوط منفصلة مع قوائع انتظار غير محجوبة بين المراحل. هذا هو ما يجعل زمن الاستجابة أقل من ثانيتين ممكناً.</p><h3>ما كنت سأفعله بشكل مختلف</h3><p>تطبيق بث TTS من البداية — بدء تشغيل الصوت أثناء إنشاء الجملة لا يزال يوفر 400-600 ميلي ثانية. كشف الصمت يحتاج أيضاً إلى هندسة أكثر مما توقعت.'}

  agents:{
    en:{tag:'Architecture · LLMs',title:'AI Agents vs. RAG Pipelines: When to Use Which',date:'February 2026 · 6 min read',body:'<p class="lead">I\'ve built both — RAG in Lumiq and MentorX, agents in Suraya Research Team. The most common question: "which one should I use?" They solve different problems.</p><h3>What RAG actually is</h3><p>RAG embeds documents, stores them in a vector database, and at query time retrieves relevant chunks for the LLM to generate from. It\'s not a reasoning system. It can\'t decide what to look for, verify outputs, or take actions. When it fails, it\'s because the question requires multi-step reasoning across sources.</p><h3>What agents actually are</h3><p>An agent is an LLM in a loop with tools. It receives a goal, picks a tool, uses it, observes the result, and decides what to do next. The power is the loop — each iteration can correct course. In Suraya Research Team, Scout searches, Analyst critiques, Scout searches again to fill gaps. This produces dramatically better output than single-pass RAG.</p><h3>Use RAG when...</h3><p>✅ Fixed, known document corpus &nbsp;✅ Questions have factual answers in documents &nbsp;✅ Latency matters &nbsp;✅ Cost matters &nbsp;✅ Users ask questions, not assign tasks</p><h3>Use agents when...</h3><p>✅ Task requires multiple steps &nbsp;✅ System must decide what to gather &nbsp;✅ Output needs verification &nbsp;✅ Task involves external actions &nbsp;✅ Users assign goals, not questions</p><h3>The hybrid approach</h3><p>In MentorX, I use both. RAG handles direct retrieval questions. The agent layer handles multi-step tasks. The key insight: RAG is a tool that agents can use. Most sophisticated systems end up being agents with a RAG tool.</p>'},
    ar:{tag:'المعمارية · نماذج اللغة',title:'وكلاء الذكاء الاصطناعي مقابل خطوط RAG: متى تستخدم أيهما',date:'فبراير 2026 · 6 دقائق قراءة',body:'<p class="lead">بنيت كليهما — RAG في Lumiq وMentorX، والوكلاء في فريق بحث سرايا. السؤال الأكثر شيوعاً: "أيهما يجب أن أستخدم؟" إنهما يحلان مشاكل مختلفة.</p><h3>ما هو RAG فعلاً</h3><p>يضمّن RAG المستندات، يخزنها في قاعدة بيانات متجهة، وعند وقت الاستعلام يسترجع الأجزاء ذات الصلة للنموذج اللغوي. إنه ليس نظام استدلال. لا يمكنه تحديد ما يبحث عنه أو التحقق من المخرجات أو اتخاذ إجراءات.</p><h3>ما هي الوكلاء فعلاً</h3><p>الوكيل هو نموذج لغوي في حلقة مع أدوات. يستقبل هدفاً، يختار أداة، يستخدمها، يلاحظ النتيجة، ويقرر الخطوة التالية. القوة في الحلقة — كل تكرار يمكنه تصحيح المسار.</p><h3>استخدم RAG عندما...</h3><p>✅ مجموعة مستندات ثابتة ومعروفة &nbsp;✅ الأسئلة لها إجابات واقعية في المستندات &nbsp;✅ زمن الاستجابة مهم &nbsp;✅ التكلفة مهمة &nbsp;✅ المستخدمون يطرحون أسئلة، لا يعيّنون مهام</p><h3>استخدم الوكلاء عندما...</h3><p>✅ المهمة تتطلب خطوات متعددة &nbsp;✅ النظام يجب أن يقرر ما يجمعه &nbsp;✅ المخرجات تحتاج تحققاً &nbsp;✅ المهمة تتضمن إجراءات خارجية &nbsp;✅ المستخدمون يعيّنون أهدافاً</p><h3>النهج الهجين</h3><p>في MentorX أستخدم كليهما. RAG للاسترجاع المباشر، والوكلاء للمهام متعددة الخطوات. الفكرة الأساسية: RAG هو أداة يمكن للوكلاء استخدامها.'}
  },
  llmprod:{
    en:{tag:'MLOps · Production',title:'What I Learned Deploying LLMs to Production',date:'January 2026 · 10 min read',body:'<p class="lead">Notebooks lie. Everything works in a notebook. Production is where assumptions get stress-tested.</p><h3>1. Streaming is not optional</h3><p>Waiting 8 seconds for a response to appear all at once feels broken. Streaming makes a 6-second response feel fast. Every LLM API supports streaming. Use it from day one. In FastAPI this means StreamingResponse with SSE. 20 lines of code, transforms the feel of your app.</p><h3>2. Prompt versioning is real engineering</h3><p>Your system prompt is code. Version control it. I store prompts as named files in /prompts, committed with git. For critical prompts I maintain an eval set — 20-30 input/output pairs — and run it before deploying any change.</p><h3>3. Token costs will surprise you</h3><p>In Lumiq I injected full conversation history into every API call. With 40-50 message conversations, I was spending 15,000 tokens per call — 10x my budget. Fix: sliding window context, conversation summarization, topic-aware retrieval. Cut token usage 70% with negligible quality loss.</p><h3>4. Error handling is where systems live or die</h3><p>LLM APIs are not 100% reliable. Build in: retry with exponential backoff, fallback to simpler model, graceful error messages. Also validate LLM outputs — if you ask for JSON and get malformed JSON, catch it and retry.</p><h3>5. Log everything</h3><p>Log every API call: prompt, response, latency, token count, session ID. Also log user feedback — even thumbs up/down gives you a dataset to analyze which prompts produce bad output.</p><h3>6. Caching is your best friend</h3><p>In MentorX, semantic caching cut API costs 35% and reduced average response time 60% for popular questions. Embed the query, check similarity against cache, return cached response if threshold exceeded.</p>'},
    ar:{tag:'MLOps · الإنتاج',title:'ما تعلمته من نشر نماذج اللغة الكبيرة في الإنتاج',date:'يناير 2026 · 10 دقائق قراءة',body:'<p class="lead">دفاتر ملاحظات Jupyter تكذب. كل شيء يعمل في دفتر الملاحظات. الإنتاج هو المكان الذي تُختبر فيه افتراضاتك.</p><h3>١. البث ليس اختيارياً</h3><p>الانتظار 8 ثوانٍ لظهور استجابة دفعة واحدة يبدو معطوباً. البث يجعل الاستجابة التي تستغرق 6 ثوانٍ تبدو سريعة. كل واجهة برمجية للنماذج اللغوية تدعم البث. استخدمه من اليوم الأول.</p><h3>٢. إصدار الموجهات هندسة حقيقية</h3><p>موجه النظام الخاص بك هو كود. تحكم في إصداراته. أخزّن الموجهات كملفات مسماة في /prompts، ملتزماً بها مع git. للموجهات الحرجة أحتفظ بمجموعة تقييم — 20-30 زوج إدخال/إخراج.</p><h3>٣. تكاليف الرموز ستفاجئك</h3><p>في Lumiq أدخلت تاريخ المحادثة الكامل في كل استدعاء API. مع محادثات من 40-50 رسالة، كنت أنفق 15,000 رمز لكل استدعاء — 10 أضعاف ميزانيتي. الحل: نافذة سياق منزلقة، تلخيص المحادثة، استرجاع واعٍ بالموضوع.</p><h3>٤. معالجة الأخطاء هي ما يحدد البقاء</h3><p>واجهات برمجة النماذج اللغوية ليست موثوقة 100٪. ابنِ فيها: إعادة المحاولة مع تراجع أسي، احتياطي لنموذج أبسط، رسائل خطأ مناسبة.</p><h3>٥. سجّل كل شيء</h3><p>سجّل كل استدعاء API: الموجه، الاستجابة، زمن الاستجابة، عدد الرموز، معرف الجلسة. سجّل أيضاً تعليقات المستخدمين.</p><h3>٦. التخزين المؤقت هو أفضل صديق لك</h3><p>في MentorX، قلّل التخزين المؤقت الدلالي تكاليف API بنسبة 35٪ وخفض متوسط وقت الاستجابة بنسبة 60٪ للأسئلة الشائعة.'}
  },
  multiagent:{
    en:{tag:'Multi-Agent · Design',title:'Designing Multi-Agent Systems That Actually Work',date:'December 2025 · 7 min read',body:'<p class="lead">Multi-agent systems are seductive. Specialized agents collaborating to produce output beyond any single agent — compelling. Also where most teams get burned.</p><h3>Why single-agent systems fail</h3><p>Ask a single LLM to research and write a report. It produces something authoritative-sounding with hallucinations and no mechanism for catching its own errors. The breakthrough: what if one agent\'s job was specifically to critique another? Now errors get caught before reaching the user.</p><h3>Role design: the most important decision</h3><p><strong>Scout:</strong> gathers raw facts, does not analyze or conclude. <strong>Analyst:</strong> critiques Scout\'s output, identifies gaps — does not generate new content. <strong>Writer:</strong> synthesizes validated material — does not add new facts. Without explicit boundaries, agents drift and overlap.</p><h3>Structured handoffs</h3><p>Agents communicate through structured messages with explicit sections. Scout\'s output always has: FINDINGS (bullets with sources), CONFIDENCE (per finding), GAPS (follow-up questions). This structure matters — the next agent parses the previous one programmatically.</p><h3>Streaming: making it feel alive</h3><p>The biggest UX win was streaming agent thoughts in real-time. Users watch Scout gathering facts, Analyst critiquing, Writer synthesizing. The transparent process builds trust that a loading spinner never could.</p><h3>Failure modes</h3><p>⚠️ Infinite loops: set a hard iteration limit. ⚠️ Role collapse: enforce boundaries explicitly. ⚠️ Echo chambers: give Analyst a contrarian persona. ⚠️ Token explosion: set per-agent context limits.</p>'},
    ar:{tag:'متعدد الوكلاء · تصميم',title:'تصميم أنظمة متعددة الوكلاء تعمل فعلاً',date:'ديسمبر 2025 · 7 دقائق قراءة',body:'<p class="lead">الأنظمة متعددة الوكلاء مغرية. وكلاء متخصصون يتعاونون لإنتاج مخرجات تتجاوز ما يستطيعه أي وكيل منفرد — فكرة مقنعة. وأيضاً حيث تحترق معظم الفرق.</p><h3>لماذا تفشل أنظمة الوكيل الواحد</h3><p>اطلب من نموذج لغوي واحد البحث وكتابة تقرير. سينتج شيئاً يبدو موثوقاً مليئاً بالهلوسات وبدون آلية للتحقق من أخطائه الخاصة. الاختراق: ماذا لو كانت مهمة وكيل واحد تحديداً انتقاد مخرجات وكيل آخر؟</p><h3>تصميم الأدوار: القرار الأهم</h3><p><strong>الكشاف:</strong> يجمع الحقائق الخام، لا يحلل أو يستنتج. <strong>المحلل:</strong> ينتقد مخرجات الكشاف، يحدد الثغرات — لا ينتج محتوى جديداً. <strong>الكاتب:</strong> يوحد المواد المتحقق منها — لا يضيف حقائق جديدة.</p><h3>التسليمات المنظمة</h3><p>يتواصل الوكلاء عبر رسائل منظمة بأقسام صريحة. مخرجات الكشاف دائماً تحتوي على: النتائج (نقاط مع مصادر)، الثقة (لكل نتيجة)، الثغرات (أسئلة للمتابعة).</p><h3>البث: جعله يبدو حياً</h3><p>أكبر فوز في تجربة المستخدم كان بث أفكار الوكلاء في الوقت الفعلي. المستخدمون يشاهدون الكشاف يجمع الحقائق، والمحلل ينتقد، والكاتب يوحد. العملية الشفافة تبني ثقة لا يستطيع دوار التحميل تحقيقها أبداً.</p><h3>أوضاع الفشل</h3><p>⚠️ الحلقات اللانهائية: ضع حداً صارماً للتكرار. ⚠️ انهيار الأدوار: فرّض الحدود صراحةً. ⚠️ غرف الصدى: أعط المحلل شخصية معارضة. ⚠️ انفجار الرموز: ضع حدوداً للسياق لكل وكيل.'}
  },
  journey:{
    en:{tag:'Career · AI',title:'From AI Student to AI Founder: My Journey',date:'November 2025 · 5 min read',body:'<p class="lead">I didn\'t plan to found an AI company. I planned to graduate, get a good job, and work on interesting problems. But somewhere between my first neural network and my third shipped product, the plan changed.</p><h3>The beginning: things that didn\'t work</h3><p>My first serious AI project was Arabic restaurant review sentiment analysis. I achieved 71% accuracy and thought I\'d done something impressive. I hadn\'t — 71% on binary classification barely beats always predicting the majority class. I learned more from that failure than from any course.</p><h3>The turning point: shipping real products</h3><p>Lumiq changed my relationship with AI. First project where I had to think about users, not accuracy metrics. Real students, real frustration when answers were wrong. I rebuilt the RAG pipeline three times — each rebuild driven by observing real user failures.</p><h3>Why I started Suraya AI</h3><p>After building Suraya Voice Agent, people started asking: "Can this work for customer service?" The Arabic-speaking market is enormous and dramatically underserved. Most AI companies treat Arabic as a localization afterthought. I saw a real gap. Suraya AI is my attempt to close it.</p><h3>What I wish I\'d known earlier</h3><p>📌 Ship early — 10 real users beats 100 hours of self-evaluation. 📌 Read papers but build products — theory without application creates engineers who can explain but can\'t build. 📌 The hardest problems aren\'t the AI — they\'re the pipelines, latency, cost, and edge cases. 📌 Build in public — it attracts collaborators and opportunities.</p>'},
    ar:{tag:'المسيرة المهنية · الذكاء الاصطناعي',title:'من طالب ذكاء اصطناعي إلى مؤسس شركة: رحلتي',date:'نوفمبر 2025 · 5 دقائق قراءة',body:'<p class="lead">لم أكن أخطط لتأسيس شركة ذكاء اصطناعي. كنت أخطط للتخرج، الحصول على وظيفة جيدة، والعمل على مشاكل مثيرة للاهتمام. لكن في مكان ما بين شبكتي العصبية الأولى ومنتجي الثالث المُشحون، تغيرت الخطة.</p><h3>البداية: أشياء لم تنجح</h3><p>مشروعي الذكاء الاصطناعي الجدي الأول كان تحليل مشاعر مراجعات المطاعم العربية. حققت دقة 71٪ واعتقدت أنني فعلت شيئاً رائعاً. لم أكن كذلك — 71٪ في التصنيف الثنائي بالكاد يتجاوز التنبؤ دائماً بالفئة الأكثر شيوعاً. تعلمت من ذلك الفشل أكثر من أي دورة.</p><h3>نقطة التحول: شحن منتجات حقيقية</h3><p>غيّر Lumiq علاقتي بالذكاء الاصطناعي. أول مشروع يجب فيه التفكير في المستخدمين، لا مقاييس الدقة. طلاب حقيقيون، إحباط حقيقي عند خطأ الإجابات. أعدت بناء خط RAG ثلاث مرات — كل إعادة بناء مدفوعة بمراقبة إخفاقات المستخدمين الحقيقيين.</p><h3>لماذا أسست سرايا AI</h3><p>بعد بناء وكيل صوت سرايا، بدأ الناس يسألون: "هل يمكن أن يعمل هذا لخدمة العملاء؟" السوق الناطق بالعربية ضخم وتخدمه الشركات بشكل ضعيف جداً. معظم شركات الذكاء الاصطناعي تتعامل مع العربية كأمر ثانوي. رأيت ثغرة حقيقية. سرايا AI هي محاولتي لسدها.</p><h3>ما كنت أتمنى معرفته مبكراً</h3><p>📌 اشحن مبكراً — 10 مستخدمين حقيقيين أفضل من 100 ساعة من التقييم الذاتي. 📌 اقرأ الأوراق البحثية لكن ابنِ منتجات — النظرية بدون تطبيق تخلق مهندسين يشرحون لكنهم لا يبنون. 📌 أصعب المشاكل ليست الذكاء الاصطناعي — بل الأنابيب وزمن الاستجابة والتكلفة والحالات الحافة. 📌 ابنِ علناً — يجذب المتعاونين والفرص.'}
  },
  dental:{
    en:{tag:'Computer Vision · Medical',title:'Building DentalDiagnosisAI: YOLOv8 + Grad-CAM Explained',date:'October 2025 · 9 min read',body:'<p class="lead">Medical AI has a trust problem. A model can achieve 94% accuracy on a benchmark and still be useless in clinical practice — because clinicians don\'t trust a black box, and they shouldn\'t.</p><h3>Why dental images are hard</h3><p>Contrast between healthy and diseased tissue is often subtle. Multiple conditions co-occur. And false negatives (missed cavity, missed abscess) are significantly worse than false positives — standard accuracy metrics don\'t capture what actually matters.</p><h3>Stage 1: Detection with YOLOv8</h3><p>Fine-tuned YOLOv8m on annotated dental images with heavy augmentation. The hardest challenge: dental conditions don\'t have clean boundaries. I worked with a dentist to define annotation guidelines around the visually apparent lesion boundary — the only thing the model can learn from image features.</p><h3>Stage 2: Classification with EfficientNetV2</h3><p>Each detected region → EfficientNetV2-S for condition type (caries, gingivitis, abscess, healthy) and severity (mild, moderate, severe). Transfer learning from ImageNet — even though dental images look nothing like ImageNet, low-level feature detectors transfer remarkably well.</p><h3>The explainability layer: Grad-CAM</h3><p>Grad-CAM computes the gradient of the class score with respect to the final convolutional layer. The result: a heatmap overlay showing what the model focused on. When it aligns with the visible lesion, clinicians gain confidence. When it doesn\'t — even with high confidence — it\'s a quality signal that something is wrong. Explainability isn\'t just about trust. It\'s a quality signal.</p><h3>The Gradio interface</h3><p>Output: detection boxes, Grad-CAM heatmap per region, structured diagnostic report, and LLM-generated natural language explanation. The natural language layer was a late addition — but it\'s what made the tool usable for non-technical users.</p>'},
    ar:{tag:'رؤية حاسوبية · طبي',title:'بناء DentalDiagnosisAI: شرح YOLOv8 + Grad-CAM',date:'أكتوبر 2025 · 9 دقائق قراءة',body:'<p class="lead">يعاني الذكاء الاصطناعي الطبي من مشكلة ثقة. يمكن لنموذج تحقيق دقة 94٪ على مجموعة بيانات تقييمية وما زال غير مفيد في الممارسة السريرية — لأن الأطباء لا يثقون في الصندوق الأسود، وهم محقون في ذلك.</p><h3>لماذا صور الأسنان صعبة</h3><p>التباين بين الأنسجة الصحية والمريضة غالباً خفي. تتعايش حالات متعددة. والنتائج السلبية الخاطئة (تجويف فائت، خراج فائت) أسوأ بكثير من الإيجابيات الخاطئة — مقاييس الدقة القياسية لا تلتقط ما يهم فعلاً.</p><h3>المرحلة الأولى: الكشف بـ YOLOv8</h3><p>ضبط دقيق لـ YOLOv8m على صور أسنان مُوسومة مع تضخيم بيانات مكثف. أصعب تحدٍّ: حالات الأسنان ليس لها حدود واضحة. عملت مع طبيب أسنان لتعريف إرشادات التوسيم.</p><h3>المرحلة الثانية: التصنيف بـ EfficientNetV2</h3><p>كل منطقة مكتشفة → EfficientNetV2-S لنوع الحالة (تسوس، التهاب لثة، خراج، صحي) وشدتها (خفيفة، متوسطة، شديدة). التعلم بالنقل من ImageNet يعمل بشكل مذهل حتى مع صور الأسنان.</p><h3>طبقة القابلية للتفسير: Grad-CAM</h3><p>يحسب Grad-CAM تدرج درجة الفئة بالنسبة للطبقة التفافية الأخيرة. النتيجة: تراكب خريطة حرارية تُظهر ما ركّز عليه النموذج. عندما يتوافق مع الآفة المرئية، يكتسب الأطباء الثقة. القابلية للتفسير ليست فقط عن الثقة — إنها إشارة جودة.</p><h3>واجهة Gradio</h3><p>المخرجات: صناديق الكشف، تراكب خريطة Grad-CAM لكل منطقة، تقرير تشخيصي منظم، وشرح باللغة الطبيعية يولده نموذج لغوي. طبقة اللغة الطبيعية كانت إضافة متأخرة — لكنها ما جعل الأداة قابلة للاستخدام للمستخدمين غير التقنيين.'}

function sendForm(){

  fetch('https://formspree.io/f/mqeylepl',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({name:name,email:email,subject:subject,message:message})})

  .catch(function(){status.style.color='#ff6b6b';status.textContent=T[currentLang].errSend;})
  .finally(function(){btn.disabled=false;btn.textContent=T[currentLang].sendBtn;});
}

// ─── RENDER ENGINE ────────────────────────────────────────────────────────

function render(lang){
  var t=T[lang];
  var isAr=lang==='ar';
  document.body.classList.toggle('rtl',isAr);
  document.documentElement.lang=lang;
  document.getElementById('langEN').classList.toggle('active-lang',!isAr);
  document.getElementById('langAR').classList.toggle('active-lang',isAr);

  // data-key simple text elements
  document.querySelectorAll('[data-key]').forEach(function(el){
    var k=el.dataset.key;
    if(k==='role')el.textContent=t.role;
    else if(k==='btn1')el.textContent=t.btn1;
    else if(k==='btn2')el.textContent=t.btn2;
    else if(k.startsWith('stat'))el.textContent=t.stats[parseInt(k.slice(4))];
    else if(k.startsWith('lbl_'))el.textContent=t['lbl_'+k.slice(4)];
    else if(k.startsWith('h2_'))el.textContent=t['h2_'+k.slice(3)];
    else if(k==='infoTitle')el.textContent=t.infoTitle;
    else if(k.startsWith('il'))el.textContent=t.il[parseInt(k.slice(2))];
    else if(k.startsWith('iv'))el.innerHTML=t.iv[parseInt(k.slice(2))];
    else if(k==='contactDesc')el.textContent=t.contactDesc;
    else if(k==='sendBtn')el.textContent=t.sendBtn;
    else if(k==='nav'+'0'){}// handled below
  });

  // badge
  document.getElementById('heroBadge').innerHTML='<span class="dot"></span>'+t.badge;

  // hero name
  document.getElementById('heroName').textContent=lang==='ar'?'العز الدميني':'Alezz Aldumaini';

  // nav links
  var navAs=document.querySelectorAll('#navLinks a');
  t.nav.forEach(function(txt,i){if(navAs[i])navAs[i].textContent=txt;});

  // about text
  document.getElementById('aboutText').innerHTML=t.aboutPs.map(function(p){return '<p>'+p+'</p>';}).join('');

  // skills
  document.getElementById('skillGrid').innerHTML=t.skills.map(function(s){
    return '<div class="skill-card"><h3>'+s.icon+' '+s.title+'</h3><div class="tags">'+s.tags.map(function(tag){return '<span class="tag">'+tag+'</span>';}).join('')+'</div></div>';
  }).join('');

  // filter bar
  document.getElementById('filterBar').innerHTML=t.filters.map(function(f,i){
    return '<button class="filter-btn'+(i===0?' active':'')+'" data-filter="'+t.filterKeys[i]+'">'+f+'</button>';
  }).join('');

  // projects
  document.getElementById('projGrid').innerHTML=t.projects.map(function(p){
    var links='';
    if(p.gh)links+='<a href="https://github.com/Aalezz" target="_blank" class="proj-link proj-link-gh">'+t.ghBtn+'</a>';
    if(p.demo)links+='<a href="https://aalezz.github.io/suraya-ai/" target="_blank" class="proj-link proj-link-demo">'+t.demoBtn+'</a>';
    if(p.cs)links+='<button class="case-study-btn" onclick="openCS(\''+p.cs+'\')">'+t.csBtn+'</button>';
    return '<div class="proj-card" data-cat="'+p.cat+'">'+(p.featured?'<span class="featured-badge">'+t.featuredLabel+'</span>':'')+
      '<div class="proj-header"><div class="proj-icon">'+p.icon+'</div><div class="proj-title"><h3>'+p.title+'</h3><div class="proj-date">'+p.date+'</div></div></div>'+
      (p.desc?'<p>'+p.desc+'</p>':'')+
      '<ul class="proj-bullets">'+p.bullets.map(function(b){return '<li>'+b+'</li>';}).join('')+'</ul>'+
      '<div class="proj-tags">'+p.tags.map(function(tag){return '<span class="proj-tag">'+tag+'</span>';}).join('')+'</div>'+
      '<div class="proj-links">'+links+'</div></div>';
  }).join('');

  // more gh button
  document.getElementById('moreGhBtn').textContent=t.moreGh;

  // timeline
  document.getElementById('timelineEl').innerHTML=t.timeline.map(function(item){
    return '<div class="tl-item"><div class="tl-date">'+item.date+'</div><h3>'+item.title+'</h3><p>'+item.desc+'</p></div>';
  }).join('');

  // certs
  document.getElementById('certGrid').innerHTML=t.certs.map(function(c){
    return '<div class="skill-card"><h3>'+c.icon+' '+c.title+'</h3><div class="tags">'+c.tags.map(function(tag){return '<span class="tag">'+tag+'</span>';}).join('')+'</div></div>';
  }).join('');

  // testimonials
  document.getElementById('testimonialsGrid').innerHTML=t.testimonials.map(function(t2){
    return '<div class="testimonial-card"><div class="quote-mark">"</div><p class="testimonial-text">'+t2.text+'</p><div class="testimonial-author"><div class="author-avatar">'+t2.avatar+'</div><div><div class="author-name">'+t2.name+'</div><div class="author-role">'+t2.role+'</div><div class="author-stars">★★★★★</div></div></div></div>';
  }).join('');

  // blog cards
  document.getElementById('blogGrid').innerHTML=t.blogCards.map(function(b){
    return '<div class="blog-card" onclick="openBlog(\''+b.id+'\')"><span class="blog-tag-el">'+b.tag+'</span><h3>'+b.title+'</h3><p>'+b.desc+'</p><div class="blog-meta"><span>⏱ '+b.time+' '+t.readTime+'</span><span class="blog-arrow">→</span></div></div>';
  }).join('');

  // footer nav
  document.getElementById('footerNav').innerHTML=t.footerNav.map(function(n,i){
    return '<a href="'+t.footerLinks[i]+'">'+n+'</a>';
  }).join('');
  document.getElementById('footerCopy').innerHTML=t.footerCopy;

  // form placeholders & button
  var phs=['cf-name','cf-email','cf-subject','cf-message'];
  phs.forEach(function(id,i){document.getElementById(id).placeholder=t.ph[i];});
  document.getElementById('cf-btn').textContent=t.sendBtn;

  // typed text
  phrases.length=0;
  t.typing.forEach(function(p){phrases.push(p);});
  pi=0;ci=0;deleting=false;typedEl.textContent='';
  clearTimeout(typingTimer);
  setTimeout(runTyping,500);
}

function setLang(lang){
  currentLang=lang;
  render(lang);
}

// Initial render
render('en');
setTimeout(runTyping,800);
</script>
