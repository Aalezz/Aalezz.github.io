<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<title>Alezz Aldumaini – AI Engineer</title>
<style>
:root{--bg:#060a12;--surface:#0d1525;--card:#111927;--accent:#00d4ff;--accent2:#7c3aed;--accent3:#06ffa5;--text:#e2e8f0;--muted:#8892a4;--border:rgba(0,212,255,0.15);}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;line-height:1.7;overflow-x:hidden;}
#canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
nav{position:fixed;top:0;width:100%;z-index:200;background:rgba(6,10,18,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-inner{max-width:1100px;margin:auto;display:flex;align-items:center;justify-content:space-between;height:62px;padding:0 5%;}
.logo{font-size:1rem;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:.88rem;transition:.2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--accent);transition:.3s;}
.nav-links a:hover{color:var(--accent);}
.nav-links a:hover::after{width:100%;}
.wrapper{position:relative;z-index:1;}
#hero{min-height:auto;display:flex;align-items:center;padding:100px 5% 60px;}
.hero-inner{max-width:1100px;margin:auto;width:100%;}
.hero-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.35rem 1rem;background:rgba(0,212,255,0.08);border:1px solid var(--border);border-radius:30px;font-size:.78rem;color:var(--accent);margin-bottom:2rem;}
.hero-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--accent3);box-shadow:0 0 8px var(--accent3);animation:pulse 2s infinite;}
.hero-inner h1{font-size:clamp(2.8rem,7vw,5.5rem);font-weight:900;line-height:1.05;margin-bottom:1rem;}
.hero-inner h1 .name{background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200%;animation:gradShift 4s ease infinite;}
.hero-role{font-size:1.1rem;color:var(--accent2);font-weight:600;margin-bottom:.6rem;}
.hero-sub{font-size:1.05rem;color:var(--muted);max-width:580px;margin-bottom:2.5rem;min-height:2.5rem;}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;}
.btn{padding:.75rem 1.8rem;border-radius:10px;font-size:.92rem;font-weight:700;text-decoration:none;transition:.25s;cursor:pointer;border:none;display:inline-block;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 0 24px rgba(0,212,255,0.25);}
.btn-primary:hover{transform:translateY(-2px);}
.btn-outline{border:1px solid var(--border);color:var(--text);background:transparent;}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px);}
.btn-cv{border:1px solid rgba(6,255,165,0.4);color:var(--accent3);background:rgba(6,255,165,0.07);}
.btn-cv:hover{border-color:var(--accent3);background:rgba(6,255,165,0.15);transform:translateY(-2px);box-shadow:0 0 18px rgba(6,255,165,0.2);}
.hero-stats{display:flex;gap:3rem;margin-top:4rem;flex-wrap:wrap;}
.stat strong{display:block;font-size:2rem;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat span{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.sec{padding:100px 5%;max-width:1100px;margin:auto;}
.sec-label{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem;}
.sec h2{font-size:2.2rem;font-weight:800;margin-bottom:2.5rem;}
.full-bg{background:var(--surface);}
.full-bg .sec{max-width:100%;}
.full-bg .sec-inner{max-width:1100px;margin:auto;}
.about-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:3rem;align-items:start;}
.about-text p{color:var(--muted);margin-bottom:1rem;font-size:.97rem;}
.about-text p strong{color:var(--text);}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.8rem;}
.info-card h3{font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:1.2rem;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:.55rem 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.88rem;}
.info-row:last-child{border:none;}
.info-row .lbl{color:var(--muted);}
.status-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.2rem .7rem;background:rgba(6,255,165,0.1);border:1px solid rgba(6,255,165,0.25);border-radius:20px;font-size:.78rem;color:var(--accent3);}
.status-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent3);animation:pulse 2s infinite;}
.skill-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:1.5rem;}
.skill-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.6rem;transition:.3s;}
.skill-card:hover{border-color:rgba(0,212,255,.35);transform:translateY(-5px);}
.skill-card h3{font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;}
.tags{display:flex;flex-wrap:wrap;gap:.4rem;}
.tag{display:inline-block;padding:.28rem .7rem;background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.18);border-radius:20px;font-size:.78rem;color:var(--text);}
.filter-bar{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:2rem;}
.filter-btn{padding:.35rem .9rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;transition:.2s;}
.filter-btn:hover,.filter-btn.active{background:rgba(0,212,255,0.1);border-color:var(--accent);color:var(--accent);}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.8rem;}
.proj-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.8rem;position:relative;overflow:hidden;transition:.35s;display:flex;flex-direction:column;}
.proj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));transform:scaleX(0);transform-origin:left;transition:.4s;}
.proj-card:hover{border-color:rgba(0,212,255,0.35);transform:translateY(-6px);box-shadow:0 20px 60px rgba(0,0,0,.4);}
.proj-card:hover::before{transform:scaleX(1);}
.proj-header{display:flex;align-items:flex-start;gap:.8rem;margin-bottom:.8rem;}
.proj-icon{font-size:1.8rem;flex-shrink:0;}
.proj-title h3{font-size:1.05rem;font-weight:700;margin-bottom:.2rem;}
.proj-date{font-size:.75rem;color:var(--accent);font-weight:600;}
.proj-card p{color:var(--muted);font-size:.87rem;margin-bottom:1rem;flex:1;}
.proj-bullets{list-style:none;margin-bottom:1.1rem;}
.proj-bullets li{font-size:.82rem;color:var(--muted);padding:.18rem 0 .18rem 1rem;position:relative;}
.proj-bullets li::before{content:'▹';position:absolute;left:0;color:var(--accent);}
.proj-tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:auto;}
.proj-tag{padding:.22rem .65rem;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.28);border-radius:12px;font-size:.74rem;color:#a78bfa;}
.featured-badge{position:absolute;top:1rem;right:1rem;padding:.18rem .6rem;background:rgba(6,255,165,0.12);border:1px solid rgba(6,255,165,0.25);border-radius:10px;font-size:.68rem;color:var(--accent3);font-weight:700;}
.proj-links{display:flex;gap:.6rem;margin-top:1rem;flex-wrap:wrap;}
.proj-link{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .8rem;border-radius:8px;font-size:.76rem;font-weight:600;text-decoration:none;transition:.2s;border:1px solid;}
.proj-link-gh{border-color:rgba(0,212,255,0.25);color:var(--accent);background:rgba(0,212,255,0.06);}
.proj-link-gh:hover{background:rgba(0,212,255,0.14);border-color:var(--accent);}
.proj-link-demo{border-color:rgba(6,255,165,0.25);color:var(--accent3);background:rgba(6,255,165,0.06);}
.proj-link-demo:hover{background:rgba(6,255,165,0.14);border-color:var(--accent3);}
.case-study-btn{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .8rem;border-radius:8px;font-size:.76rem;font-weight:600;text-decoration:none;transition:.2s;border:1px solid rgba(124,58,237,0.3);color:#a78bfa;background:rgba(124,58,237,0.08);cursor:pointer;}
.case-study-btn:hover{background:rgba(124,58,237,0.18);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:9000;backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:2rem;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;max-width:700px;width:100%;max-height:88vh;overflow-y:auto;padding:2.5rem;position:relative;}
.modal-box.wide{max-width:800px;}
.modal-close{position:absolute;top:1.2rem;right:1.2rem;background:transparent;border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:.2s;}
.modal-close:hover{border-color:var(--accent);color:var(--accent);}
.cs-section{margin-bottom:1.6rem;}
.cs-section h4{font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:.6rem;}
.cs-section p,.cs-section li{color:var(--muted);font-size:.9rem;line-height:1.7;}
.cs-section ul{list-style:none;padding:0;}
.cs-section ul li{padding:.18rem 0 .18rem 1.1rem;position:relative;}
.cs-section ul li::before{content:'▹';position:absolute;left:0;color:var(--accent);}
.cs-outcome{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.5rem;}
.cs-outcome-item{flex:1;min-width:110px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.9rem 1rem;text-align:center;}
.cs-outcome-item strong{display:block;font-size:1.4rem;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.cs-outcome-item span{font-size:.74rem;color:var(--muted);}
.blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.8rem;}
.blog-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.8rem;transition:.35s;display:flex;flex-direction:column;position:relative;overflow:hidden;cursor:pointer;}
.blog-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent2),var(--accent3));transform:scaleX(0);transform-origin:left;transition:.4s;}
.blog-card:hover{border-color:rgba(124,58,237,0.35);transform:translateY(-6px);box-shadow:0 20px 60px rgba(0,0,0,.4);}
.blog-card:hover::before{transform:scaleX(1);}
.blog-tag-el{display:inline-block;padding:.2rem .7rem;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.28);border-radius:12px;font-size:.72rem;color:#a78bfa;margin-bottom:1rem;font-weight:600;}
.blog-card h3{font-size:1rem;font-weight:700;margin-bottom:.6rem;line-height:1.4;}
.blog-card p{color:var(--muted);font-size:.85rem;flex:1;margin-bottom:1.2rem;}
.blog-meta{display:flex;align-items:center;justify-content:space-between;font-size:.76rem;color:var(--muted);}
.blog-arrow{color:var(--accent);font-size:1rem;transition:.2s;}
.blog-card:hover .blog-arrow{transform:translateX(4px);}
.testimonials-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;}
.testimonial-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.8rem;position:relative;transition:.3s;}
.testimonial-card:hover{border-color:rgba(0,212,255,0.3);transform:translateY(-4px);}
.quote-mark{font-size:3rem;line-height:1;color:var(--accent);opacity:.3;font-family:Georgia,serif;position:absolute;top:1rem;left:1.5rem;}
body.rtl .quote-mark{left:auto;right:1.5rem;}
.testimonial-text{color:var(--muted);font-size:.92rem;line-height:1.75;margin-bottom:1.4rem;padding-top:1.5rem;font-style:italic;}
.testimonial-author{display:flex;align-items:center;gap:.9rem;}
.author-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.author-name{font-weight:700;font-size:.9rem;}
.author-role{font-size:.78rem;color:var(--muted);}
.author-stars{color:#fbbf24;font-size:.8rem;margin-top:.1rem;}
.timeline{position:relative;padding-left:2.5rem;}
.timeline::before{content:'';position:absolute;left:0;top:8px;bottom:0;width:2px;background:linear-gradient(to bottom,var(--accent),var(--accent2),transparent);}
.tl-item{position:relative;margin-bottom:2.8rem;}
.tl-item::before{content:'';position:absolute;left:-2.62rem;top:.45rem;width:14px;height:14px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent);}
.tl-date{font-size:.78rem;color:var(--accent);font-weight:700;letter-spacing:.06em;margin-bottom:.25rem;}
.tl-item h3{font-size:1.05rem;font-weight:700;margin-bottom:.25rem;}
.tl-item p{color:var(--muted);font-size:.9rem;}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start;}
.contact-info p{color:var(--muted);margin-bottom:2rem;font-size:.97rem;}
.c-links{display:flex;flex-direction:column;gap:.9rem;}
.c-link{display:flex;align-items:center;gap:.8rem;padding:1rem 1.3rem;background:var(--card);border:1px solid var(--border);border-radius:13px;text-decoration:none;color:var(--text);transition:.25s;font-size:.9rem;}
.c-link:hover{border-color:var(--accent);color:var(--accent);transform:translateX(5px);}
.c-link .ic{font-size:1.2rem;width:28px;text-align:center;}
.contact-form{display:flex;flex-direction:column;gap:1rem;}
.contact-form input,.contact-form textarea{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:.85rem 1.1rem;color:var(--text);font-size:.9rem;outline:none;transition:.25s;font-family:inherit;width:100%;}
.contact-form input:focus,.contact-form textarea:focus{border-color:var(--accent);}
.contact-form textarea{resize:vertical;min-height:130px;}
.contact-form button{padding:.9rem;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:11px;color:#fff;font-weight:700;font-size:.95rem;cursor:pointer;transition:.25s;}
.contact-form button:hover{opacity:.88;transform:translateY(-2px);}
footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:2.5rem 5%;background:var(--surface);}
.footer-inner{max-width:1100px;margin:auto;display:flex;flex-direction:column;align-items:center;gap:1.4rem;}
.footer-logo{font-size:1.1rem;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.footer-socials{display:flex;gap:.6rem;}
.footer-social{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;text-decoration:none;transition:.25s;color:var(--muted);background:var(--card);}
.footer-social:hover{border-color:var(--accent);transform:translateY(-3px);}
.footer-nav{display:flex;gap:1.8rem;flex-wrap:wrap;justify-content:center;}
.footer-nav a{color:var(--muted);text-decoration:none;font-size:.83rem;transition:.2s;}
.footer-nav a:hover{color:var(--accent);}
.footer-divider{width:100%;height:1px;background:var(--border);}
.footer-copy{color:var(--muted);font-size:.8rem;text-align:center;}
.footer-copy span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;}
.hero-layout{display:grid;grid-template-columns:1fr auto;gap:4rem;align-items:center;}
.hero-avatar-wrap{position:relative;width:300px;height:300px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.avatar-core{width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 40% 40%,rgba(0,212,255,0.12),rgba(124,58,237,0.08),rgba(6,10,18,0.9));border:2px solid rgba(0,212,255,0.25);display:flex;align-items:center;justify-content:center;position:relative;z-index:3;}
.brain-svg{width:110px;height:110px;filter:drop-shadow(0 0 8px rgba(0,212,255,0.4));}
.avatar-ring{position:absolute;border-radius:50%;border:1px solid;animation:spinRing linear infinite;}
.ring1{width:200px;height:200px;border-color:rgba(0,212,255,0.2);animation-duration:12s;}
.ring2{width:245px;height:245px;border-color:rgba(124,58,237,0.18);animation-duration:18s;animation-direction:reverse;}
.ring3{width:290px;height:290px;border-color:rgba(6,255,165,0.12);animation-duration:25s;}
.orbit-particle{position:absolute;border-radius:50%;animation:orbitSpin linear infinite;}
.p1{width:8px;height:8px;background:#00d4ff;box-shadow:0 0 10px #00d4ff;top:50%;left:50%;animation-duration:4s;transform-origin:0 -100px;margin:-4px 0 0 -4px;}
.p2{width:6px;height:6px;background:#7c3aed;top:50%;left:50%;animation-duration:6s;transform-origin:0 -122px;margin:-3px 0 0 -3px;animation-delay:-.5s;}
.p3{width:5px;height:5px;background:#06ffa5;top:50%;left:50%;animation-duration:8s;transform-origin:0 -145px;margin:-2.5px 0 0 -2.5px;animation-delay:-1s;}
.p4{width:7px;height:7px;background:#00d4ff;top:50%;left:50%;animation-duration:5s;transform-origin:0 -100px;margin:-3.5px 0 0 -3.5px;animation-delay:-2s;}
.p5{width:5px;height:5px;background:#7c3aed;top:50%;left:50%;animation-duration:7s;transform-origin:0 -122px;margin:-2.5px 0 0 -2.5px;animation-delay:-3s;}
.p6{width:6px;height:6px;background:#06ffa5;top:50%;left:50%;animation-duration:9s;transform-origin:0 -145px;margin:-3px 0 0 -3px;animation-delay:-4s;}
.lang-switch{display:flex;gap:.4rem;align-items:center;}
.lang-btn{background:transparent;border:1px solid rgba(0,212,255,0.3);color:var(--muted);padding:.28rem .75rem;border-radius:20px;font-size:.8rem;font-weight:700;cursor:pointer;transition:.2s;}
.lang-btn:hover{border-color:#00d4ff;color:#00d4ff;}
.lang-btn.active-lang{background:linear-gradient(135deg,#00d4ff,#7c3aed);color:#fff;border-color:transparent;}
body.rtl{direction:rtl;font-family:'Cairo',sans-serif;}
body.rtl .nav-inner,body.rtl .hero-btns,body.rtl .hero-stats,body.rtl .filter-bar,body.rtl .nav-links,body.rtl .footer-nav{flex-direction:row-reverse;}
body.rtl .hero-badge{flex-direction:row-reverse;}
body.rtl .about-grid,body.rtl .contact-grid{direction:rtl;}
body.rtl .info-row{flex-direction:row;}
body.rtl .timeline{padding-left:0;padding-right:2.5rem;}
body.rtl .timeline::before{left:auto;right:0;}
body.rtl .tl-item::before{left:auto;right:-2.62rem;}
body.rtl .c-link{flex-direction:row-reverse;}
body.rtl .proj-header{flex-direction:row-reverse;}
body.rtl .proj-bullets li{padding:.18rem 1rem .18rem 0;}
body.rtl .proj-bullets li::before{left:auto;right:0;}
body.rtl .proj-tags,.body.rtl .tags{flex-direction:row-reverse;}
body.rtl .modal-close{right:auto;left:1.2rem;}
body.rtl .blog-card:hover .blog-arrow{transform:translateX(-4px);}
body.rtl .c-link:hover{transform:translateX(-5px);}
body:not(.rtl) .proj-bullets li{padding:.18rem 0 .18rem 1rem;}
body:not(.rtl) .proj-bullets li::before{left:0;right:auto;}
.blog-post-body h3{font-size:1.05rem;font-weight:700;margin:1.8rem 0 .6rem;color:var(--accent);}
.blog-post-body p{color:var(--muted);margin-bottom:1rem;font-size:.93rem;line-height:1.8;}
.blog-post-body p.lead{font-size:1.05rem;color:var(--text);}
.blog-post-body strong{color:var(--text);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes gradShift{0%,100%{background-position:0%;}50%{background-position:100%;}}
@keyframes spinRing{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes orbitSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@media(max-width:900px){.hero-layout{grid-template-columns:1fr;}.hero-avatar-wrap{width:220px;height:220px;margin:2rem auto 0;}.avatar-core{width:120px;height:120px;}.ring1{width:150px;height:150px;}.ring2{width:185px;height:185px;}.ring3{width:215px;height:215px;}}
@media(max-width:720px){.about-grid,.contact-grid{grid-template-columns:1fr;}.nav-links{display:none;}.hero-stats{gap:1.8rem;}}
</style>

<script>
var currentLang='en';
var canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),W,H,pts=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
function Pt(){this.reset();}
Pt.prototype.reset=function(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*1.4+.3;this.vx=(Math.random()-.5)*.3;this.vy=(Math.random()-.5)*.3;this.a=Math.random()*.5+.1;this.c=Math.random()>.5?'0,212,255':'124,58,237';};
Pt.prototype.step=function(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W||this.y<0||this.y>H)this.reset();};
Pt.prototype.draw=function(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle='rgba('+this.c+','+this.a+')';ctx.fill();};
for(var i=0;i<130;i++)pts.push(new Pt());
function loop(){ctx.clearRect(0,0,W,H);pts.forEach(function(p){p.step();p.draw();});for(var i=0;i<pts.length;i++)for(var j=i+1;j<pts.length;j++){var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<110){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle='rgba(0,212,255,'+(0.12*(1-d/110))+')';ctx.lineWidth=.5;ctx.stroke();}}requestAnimationFrame(loop);}
loop();

var phrases=[],pi=0,ci=0,deleting=false,typedEl=document.getElementById('typedText'),typingTimer;
function runTyping(){clearTimeout(typingTimer);if(!phrases.length)return;var cur=phrases[pi%phrases.length];if(!deleting){typedEl.textContent=cur.slice(0,++ci);if(ci===cur.length){deleting=true;typingTimer=setTimeout(runTyping,2200);return;}}else{typedEl.textContent=cur.slice(0,--ci);if(ci===0){deleting=false;pi=(pi+1)%phrases.length;}}typingTimer=setTimeout(runTyping,deleting?35:55);}

var CS={
  suraya:{en:{title:'🎙️ Case Study: Suraya Voice Agent',sections:[{label:'The Problem',content:"Businesses serving Arabic-speaking markets lacked an affordable voice AI solution with proper dialect recognition and sub-2s latency."},{label:'Alternatives Considered',list:['Third-party platform — rejected: Arabic dialect limitations','Custom ASR from scratch — rejected: timeline and cost','Chosen: faster-whisper + Claude API + ElevenLabs pipeline']},{label:'What Was Built',content:'End-to-end voice agent: Picovoice wake word → faster-whisper STT → Claude reasoning → ElevenLabs emotional TTS. Persistent memory via JSON. All real-time on standard hardware.'},{label:'Key Outcomes',outcomes:[{value:'<2s',label:'Response Latency'},{value:'300+',label:'Concurrent Sessions'},{value:'1',label:'Startup Founded'}]},{label:'What I Learned',content:'Wake word sensitivity tuning and threading architecture are the hardest problems. Non-blocking queues between pipeline stages are essential.'}]},ar:{title:'🎙️ دراسة حالة: وكيل صوت سرايا',sections:[{label:'المشكلة',content:'كانت الشركات في الأسواق الناطقة بالعربية تفتقر إلى حل ذكاء اصطناعي صوتي بأسعار معقولة مع التعرف الصحيح على اللهجات وزمن استجابة أقل من ثانيتين.'},{label:'البدائل المدروسة',list:['منصة طرف ثالث — مرفوضة: قيود اللهجة العربية','بناء نظام ASR من الصفر — مرفوض: التكلفة والوقت','الاختيار: faster-whisper + Claude API + ElevenLabs']},{label:'ما تم بناؤه',content:'وكيل صوتي متكامل: اكتشاف كلمة التنبيه → تحويل الكلام إلى نص → تحليل Claude → تحويل النص إلى كلام عاطفي عبر ElevenLabs. ذاكرة دائمة عبر JSON.'},{label:'النتائج الرئيسية',outcomes:[{value:'<2s',label:'زمن الاستجابة'},{value:'300+',label:'جلسة متزامنة'},{value:'1',label:'شركة ناشئة'}]},{label:'ما تعلمته',content:'ضبط حساسية كلمة التنبيه ومعمارية الخيوط هما أصعب المشاكل. قوائم الانتظار غير المحجوبة بين مراحل الأنبوب ضرورية.'}]}},
  research:{en:{title:'🤖 Case Study: Suraya Research Team',sections:[{label:'The Problem',content:'A single LLM produces flat, unvalidated output. Researchers needed a system that gathers, validates, and synthesizes across multiple sources.'},{label:'Alternatives',list:['Single LLM — hallucinations without cross-checking','Sequential pipeline — too slow','Chosen: 3-agent pipeline with live SSE streaming']},{label:'What Was Built',content:'Scout researches → Analyst critiques → Writer produces final report. All streamed live via Server-Sent Events.'},{label:'Key Outcomes',outcomes:[{value:'3',label:'Specialized Agents'},{value:'Live',label:'SSE Streaming'},{value:'~60s',label:'Full Report'}]},{label:'What I Learned',content:'Explicit role boundaries are critical. Without them, agents drift and produce redundant output.'}]},ar:{title:'🤖 دراسة حالة: فريق بحث سرايا',sections:[{label:'المشكلة',content:'نموذج لغوي واحد ينتج مخرجات غير موثقة. يحتاج الباحثون إلى نظام يجمع المعلومات ويتحقق منها ويوحدها.'},{label:'البدائل',list:['نموذج واحد — هلوسات بدون تدقيق متقاطع','أنبوب تسلسلي — بطيء جداً','الاختيار: 3 وكلاء متخصصون مع بث SSE المباشر']},{label:'ما تم بناؤه',content:'الكشاف يبحث → المحلل ينتقد → الكاتب ينتج التقرير النهائي. كل شيء يُبث مباشرة عبر Server-Sent Events.'},{label:'النتائج الرئيسية',outcomes:[{value:'3',label:'وكلاء متخصصون'},{value:'مباشر',label:'بث SSE'},{value:'~60 ث',label:'تقرير كامل'}]},{label:'ما تعلمته',content:'حدود الأدوار الصريحة ضرورية. بدونها ينجرف الوكلاء وينتجون مخرجات متكررة.'}]}},
  mentorx:{en:{title:'🎓 Case Study: MentorX',sections:[{label:'The Problem',content:"Students don't learn the same way. Static courses don't adapt to individual gaps."},{label:'Alternatives',list:['Static quiz bank — no adaptation','Pure RAG chatbot — reactive only','Chosen: Adaptive LLM pipeline analyzing performance history']},{label:'What Was Built',content:'Upload materials → AI summarizes multimodally → generates calibrated quizzes → adapts difficulty and creates custom study plans.'},{label:'Key Outcomes',outcomes:[{value:'4+',label:'Content Types'},{value:'Adaptive',label:'Quiz Engine'},{value:'100%',label:'Custom Plans'}]},{label:'What I Learned',content:'Audio transcription quality determines everything downstream. Multimodal ingestion was the hardest engineering challenge.'}]},ar:{title:'🎓 دراسة حالة: MentorX',sections:[{label:'المشكلة',content:'الطلاب لا يتعلمون بنفس الطريقة. المناهج الثابتة لا تتكيف مع الفجوات الفردية.'},{label:'البدائل',list:['بنك أسئلة ثابت — لا تكيف','روبوت RAG بحت — تفاعلي فقط','الاختيار: أنبوب LLM تكيفي يحلل تاريخ الأداء']},{label:'ما تم بناؤه',content:'رفع المواد → الذكاء الاصطناعي يلخص متعدد الوسائط → يولد اختبارات معايرة → يكيف الصعوبة وينشئ خطط دراسة مخصصة.'},{label:'النتائج الرئيسية',outcomes:[{value:'4+',label:'أنواع المحتوى'},{value:'تكيفي',label:'محرك الاختبارات'},{value:'100%',label:'خطط مخصصة'}]},{label:'ما تعلمته',content:'جودة نسخ الصوت تحدد كل شيء في المراحل اللاحقة. الاستيعاب متعدد الوسائط كان أصعب تحدي هندسي.'}]}}
};

var BLOG={
  voice:{en:{tag:'Voice AI · Engineering',title:'How I Built a Real-Time Arabic Voice Agent with Whisper + Claude',date:'March 2026 · 8 min read',body:'<p class="lead">When I started building Suraya, I had one hard constraint: respond in under 2 seconds — in Arabic.</p><h3>Why existing tools failed</h3><p>Most voice AI platforms treat Arabic as an afterthought. Accuracy dropped below 60% on real conversational speech.</p><h3>Component 1: Wake Word — Picovoice Porcupine</h3><p>Porcupine runs entirely on-device. I trained a custom wake word for "Hey Suraya". Sensitivity tuning was the hardest part — I settled on 0.6 after testing with 12 people in noisy environments.</p><h3>Component 2: STT — faster-whisper</h3><p>faster-whisper with int8 quantization dropped inference to under 600ms. Pre-warming the model on startup saved another 1.2 seconds of perceived latency.</p><h3>Component 3: Reasoning — Claude API</h3><p>Transcribed text goes to Claude with a system prompt that enforces an 80-word max per response and forbids markdown formatting.</p><h3>Component 4: TTS — ElevenLabs with emotion detection</h3><p>I run a lightweight emotion classifier before ElevenLabs. Based on the label, I adjust stability parameters to change voice expressiveness.</p><h3>Threading architecture</h3><p>All four components run on separate threads with non-blocking queues between stages. This is what makes sub-2s latency achievable.</p>'},ar:{tag:'الذكاء الاصطناعي الصوتي · هندسة',title:'كيف بنيت وكيل صوتي عربي بزمن استجابة فوري',date:'مارس 2026 · 8 دقائق قراءة',body:'<p class="lead">عندما بدأت في بناء سرايا، كان لدي قيد صارم واحد: الاستجابة في أقل من ثانيتين — بالعربية.</p><h3>لماذا فشلت الأدوات الموجودة</h3><p>معظم منصات الذكاء الاصطناعي الصوتي تتعامل مع العربية كأمر ثانوي. انخفضت الدقة إلى أقل من 60% على الكلام الحواري الحقيقي.</p>'}},
  agents:{en:{tag:'Architecture · LLMs',title:'AI Agents vs. RAG Pipelines: When to Use Which',date:'February 2026 · 6 min read',body:'<p class="lead">I\'ve built both — RAG in Lumiq and MentorX, agents in Suraya Research Team.</p><h3>What RAG actually is</h3><p>RAG embeds documents, stores them in a vector database, and at query time retrieves relevant chunks. It\'s not a reasoning system.</p><h3>What agents actually are</h3><p>An agent is an LLM in a loop with tools. It receives a goal, picks a tool, uses it, observes the result, and decides what to do next.</p><h3>Use RAG when...</h3><p>✅ Fixed document corpus ✅ Questions have factual answers ✅ Latency matters ✅ Cost matters</p><h3>Use agents when...</h3><p>✅ Task requires multiple steps ✅ Output needs verification ✅ Task involves external actions</p>'},ar:{tag:'المعمارية · نماذج اللغة',title:'وكلاء الذكاء الاصطناعي مقابل خطوط RAG',date:'فبراير 2026 · 6 دقائق قراءة',body:'<p class="lead">بنيت كليهما — RAG في Lumiq وMentorX، والوكلاء في فريق بحث سرايا.</p>'}},
  llmprod:{en:{tag:'MLOps · Production',title:'What I Learned Deploying LLMs to Production',date:'January 2026 · 10 min read',body:'<p class="lead">Notebooks lie. Everything works in a notebook. Production is where assumptions get stress-tested.</p><h3>1. Streaming is not optional</h3><p>Waiting 8 seconds for a response to appear all at once feels broken. Streaming makes a 6-second response feel fast.</p><h3>2. Prompt versioning is real engineering</h3><p>Your system prompt is code. Version control it.</p><h3>3. Token costs will surprise you</h3><p>In Lumiq I injected full conversation history into every API call. With 40-50 message conversations, I was spending 15,000 tokens per call. Fix: sliding window context, conversation summarization.</p><h3>4. Log everything</h3><p>Log every API call: prompt, response, latency, token count, session ID.</p>'},ar:{tag:'MLOps · الإنتاج',title:'ما تعلمته من نشر نماذج اللغة الكبيرة في الإنتاج',date:'يناير 2026 · 10 دقائق قراءة',body:'<p class="lead">دفاتر ملاحظات Jupyter تكذب. الإنتاج هو المكان الذي تُختبر فيه افتراضاتك.</p>'}},
  multiagent:{en:{tag:'Multi-Agent · Design',title:'Designing Multi-Agent Systems That Actually Work',date:'December 2025 · 7 min read',body:'<p class="lead">Multi-agent systems are seductive. Also where most teams get burned.</p><h3>Role design: the most important decision</h3><p><strong>Scout:</strong> gathers raw facts. <strong>Analyst:</strong> critiques Scout\'s output. <strong>Writer:</strong> synthesizes validated material. Without explicit boundaries, agents drift.</p><h3>Failure modes</h3><p>⚠️ Infinite loops: set a hard iteration limit. ⚠️ Role collapse: enforce boundaries explicitly. ⚠️ Token explosion: set per-agent context limits.</p>'},ar:{tag:'متعدد الوكلاء · تصميم',title:'تصميم أنظمة متعددة الوكلاء تعمل فعلاً',date:'ديسمبر 2025 · 7 دقائق قراءة',body:'<p class="lead">الأنظمة متعددة الوكلاء مغرية. وأيضاً حيث تحترق معظم الفرق.</p>'}},
  journey:{en:{tag:'Career · AI',title:'From AI Student to AI Founder: My Journey',date:'November 2025 · 5 min read',body:'<p class="lead">I didn\'t plan to found an AI company. But somewhere between my first neural network and my third shipped product, the plan changed.</p><h3>The beginning: things that didn\'t work</h3><p>My first serious AI project was Arabic restaurant review sentiment analysis. I achieved 71% accuracy and thought I\'d done something impressive. I hadn\'t.</p><h3>Why I started Suraya AI</h3><p>After building Suraya Voice Agent, people started asking: "Can this work for customer service?" The Arabic-speaking market is enormous and dramatically underserved.</p>'},ar:{tag:'المسيرة المهنية · الذكاء الاصطناعي',title:'من طالب ذكاء اصطناعي إلى مؤسس شركة: رحلتي',date:'نوفمبر 2025 · 5 دقائق قراءة',body:'<p class="lead">لم أكن أخطط لتأسيس شركة ذكاء اصطناعي. لكن في مكان ما بين شبكتي العصبية الأولى ومنتجي الثالث المُشحون، تغيرت الخطة.</p>'}},
  dental:{en:{tag:'Computer Vision · Medical',title:'Building DentalDiagnosisAI: YOLOv8 + Grad-CAM Explained',date:'October 2025 · 9 min read',body:'<p class="lead">Medical AI has a trust problem. A model can achieve 94% accuracy and still be useless in clinical practice.</p><h3>Stage 1: Detection with YOLOv8</h3><p>Fine-tuned YOLOv8m on annotated dental images with heavy augmentation.</p><h3>Stage 2: Classification with EfficientNetV2</h3><p>Each detected region → EfficientNetV2-S for condition type and severity.</p><h3>The explainability layer: Grad-CAM</h3><p>Grad-CAM computes the gradient of the class score with respect to the final convolutional layer. The result: a heatmap overlay showing what the model focused on.</p>'},ar:{tag:'رؤية حاسوبية · طبي',title:'بناء DentalDiagnosisAI: شرح YOLOv8 + Grad-CAM',date:'أكتوبر 2025 · 9 دقائق قراءة',body:'<p class="lead">يعاني الذكاء الاصطناعي الطبي من مشكلة ثقة.</p>'}}

function render(lang){
  var t=T[lang];
  var isAr=lang==='ar';
  document.body.classList.toggle('rtl',isAr);
  document.documentElement.lang=lang;
  document.getElementById('langEN').classList.toggle('active-lang',!isAr);
  document.getElementById('langAR').classList.toggle('active-lang',isAr);
  document.querySelectorAll('[data-key]').forEach(function(el){
    var k=el.dataset.key;
    if(k==='role')el.textContent=t.role;
    else if(k==='btn1')el.textContent=t.btn1;
    else if(k==='btn2')el.textContent=t.btn2;
    else if(k==='btn3')el.textContent=t.btn3;
    else if(k.startsWith('stat'))el.textContent=t.stats[parseInt(k.slice(4))];
    else if(k.startsWith('lbl_'))el.textContent=t['lbl_'+k.slice(4)];
    else if(k.startsWith('h2_'))el.textContent=t['h2_'+k.slice(3)];
    else if(k==='infoTitle')el.textContent=t.infoTitle;
    else if(k.startsWith('il'))el.textContent=t.il[parseInt(k.slice(2))];
    else if(k.startsWith('iv'))el.innerHTML=t.iv[parseInt(k.slice(2))];
    else if(k==='lbl_edu')el.textContent=t.lbl_edu;
    else if(k==='h2_edu')el.textContent=t.h2_edu;
    else if(k==='contactDesc')el.textContent=t.contactDesc;
  });
  document.getElementById('heroBadge').innerHTML='<span class="dot"></span>'+t.badge;
  document.getElementById('heroName').textContent=lang==='ar'?'العز الدميني':'Alezz Aldumaini';
  var navAs=document.querySelectorAll('#navLinks a');
  t.nav.forEach(function(txt,i){if(navAs[i])navAs[i].textContent=txt;});
  document.getElementById('aboutText').innerHTML=t.aboutPs.map(function(p){return '<p>'+p+'</p>';}).join('');
  document.getElementById('skillGrid').innerHTML=t.skills.map(function(s){return '<div class="skill-card"><h3>'+s.icon+' '+s.title+'</h3><div class="tags">'+s.tags.map(function(tag){return '<span class="tag">'+tag+'</span>';}).join('')+'</div></div>';}).join('');
  document.getElementById('filterBar').innerHTML=t.filters.map(function(f,i){return '<button class="filter-btn'+(i===0?' active':'')+'" data-filter="'+t.filterKeys[i]+'">'+f+'</button>';}).join('');
  document.getElementById('projGrid').innerHTML=t.projects.map(function(p){var links='';if(p.gh)links+='<a href="https://github.com/Aalezz" target="_blank" class="proj-link proj-link-gh">'+t.ghBtn+'</a>';if(p.demo)links+='<a href="https://aalezz.github.io/suraya-ai/" target="_blank" class="proj-link proj-link-demo">'+t.demoBtn+'</a>';if(p.cs)links+='<button class="case-study-btn" onclick="openCS(\''+p.cs+'\')">'+t.csBtn+'</button>';return '<div class="proj-card" data-cat="'+p.cat+'">'+(p.featured?'<span class="featured-badge">'+t.featuredLabel+'</span>':'')+'<div class="proj-header"><div class="proj-icon">'+p.icon+'</div><div class="proj-title"><h3>'+p.title+'</h3><div class="proj-date">'+p.date+'</div></div></div>'+(p.desc?'<p>'+p.desc+'</p>':'')+'<ul class="proj-bullets">'+p.bullets.map(function(b){return '<li>'+b+'</li>';}).join('')+'</ul><div class="proj-tags">'+p.tags.map(function(tag){return '<span class="proj-tag">'+tag+'</span>';}).join('')+'</div><div class="proj-links">'+links+'</div></div>';}).join('');
  document.getElementById('moreGhBtn').textContent=t.moreGh;
  document.getElementById('timelineEl').innerHTML=t.timeline.map(function(item){return '<div class="tl-item"><div class="tl-date">'+item.date+'</div><h3>'+item.title+'</h3><p>'+item.desc+'</p></div>';}).join('');
  document.getElementById('educationEl').innerHTML=t.education.map(function(item){return '<div class="tl-item"><div class="tl-date">'+item.date+'</div><h3>'+item.title+'</h3><p>'+item.desc+'</p></div>';}).join('');
  document.getElementById('certGrid').innerHTML=t.certs.map(function(c){return '<div class="skill-card"><h3>'+c.icon+' '+c.title+'</h3><div class="tags">'+c.tags.map(function(tag){return '<span class="tag">'+tag+'</span>';}).join('')+'</div></div>';}).join('');

  document.getElementById('blogGrid').innerHTML=t.blogCards.map(function(b){return '<div class="blog-card" onclick="openBlog(\''+b.id+'\')"><span class="blog-tag-el">'+b.tag+'</span><h3>'+b.title+'</h3><p>'+b.desc+'</p><div class="blog-meta"><span>⏱ '+b.time+' '+t.readTime+'</span><span class="blog-arrow">→</span></div></div>';}).join('');
  document.getElementById('footerNav').innerHTML=t.footerNav.map(function(n,i){return '<a href="'+t.footerLinks[i]+'">'+n+'</a>';}).join('');
  document.getElementById('footerCopy').innerHTML=t.footerCopy;
  var phs=['cf-name','cf-email','cf-subject','cf-message'];
  phs.forEach(function(id,i){document.getElementById(id).placeholder=t.ph[i];});
  document.getElementById('cf-btn').textContent=t.sendBtn;
  phrases.length=0;t.typing.forEach(function(p){phrases.push(p);});
  pi=0;ci=0;deleting=false;typedEl.textContent='';clearTimeout(typingTimer);setTimeout(runTyping,500);
}

function setLang(lang){currentLang=lang;render(lang);}
render('en');
